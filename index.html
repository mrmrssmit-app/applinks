<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr&amp;MrsSMIT — Download the App</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #111;
    color: #fff;
    text-align: center;
    padding: 24px;
    box-sizing: border-box;
  }
  .card { max-width: 360px; }
  h1 { font-size: 1.2rem; margin-bottom: 8px; }
  p { color: #aaa; font-size: 0.95rem; margin-bottom: 20px; }
  a.btn {
    display: inline-block;
    padding: 12px 24px;
    background: #fff;
    color: #111;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    margin: 6px;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Mr&amp;MrsSMIT</h1>
    <p>Redirecting you to the app store…</p>
    <div id="fallback" style="display:none;">
      <a class="btn" href="https://apps.apple.com/us/app/mr-mrssmit/id6744360944">Download on iOS</a>
      <a class="btn" href="https://play.google.com/store/apps/details?id=mrmrs.smit.app&pcampaignid=web_share">Download on Android</a>
    </div>
  </div>

<script>
  var IOS_URL = "https://apps.apple.com/us/app/mr-mrssmit/id6744360944";
  var ANDROID_URL = "https://play.google.com/store/apps/details?id=mrmrs.smit.app&pcampaignid=web_share";

  var ua = navigator.userAgent || navigator.vendor || window.opera;

  function isIOS(ua) {
    return /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  }
  function isAndroid(ua) {
    return /android/i.test(ua);
  }

  if (isIOS(ua)) {
    window.location.replace(IOS_URL);
  } else if (isAndroid(ua)) {
    window.location.replace(ANDROID_URL);
  } else {
    // Desktop or unknown device: show both buttons instead of redirecting
    document.getElementById("fallback").style.display = "block";
    document.querySelector("p").textContent = "Choose your platform:";
  }
</script>
</body>
</html>
